# Amber Option
# =====================================================================

# clock mode
setw -g clock-mode-colour color166

# copy mode
setw -g mode-style 'fg=black bg=color166 bold'

# panes
set -g pane-border-style 'fg=color166'
set -g pane-active-border-style 'fg=color166'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=color166'

set -g status-left " #[fg=color166 bold][#S] #[default]"
set -g status-left-length 40

set -g status-right-style 'fg=white bold bg=color166'
set -g status-right ' %Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=white bold bg=color166'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=color166 bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=color166]#F '

setw -g window-status-bell-style 'fg=yellow bg=color166 bold'

# messages
set -g message-style 'fg=white bg=color166 bold'

# =====================================================================
# PLUG-INS
# =====================================================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager 
run '~/.tmux/plugins/tpm/tpm'
