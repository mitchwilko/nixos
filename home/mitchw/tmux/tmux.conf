# =====================================================================
# PERFORMANCE FIXES FOR SSH
# =====================================================================
# Drop key-sequence delay to 0 to eliminate input lag (Essential for SSH)
set -s escape-time 0

# Increase the status refresh window to reduce background data bursts
set -g status-interval 30

# Optimize terminal performance overrides
set -g default-terminal "screen-256color"
set -as terminal-overrides ",xterm*:Tc"

# Allow Yazi to render images cleanly through Tmux
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Ensure clipboard syncing works seamlessly inside Yazi + Tmux
set -s set-clipboard on

# =====================================================================
# KEYBINDS
# =====================================================================

# Refresh the source file
bind R source-file '~/.tmux.conf'; display-message "Config Reloaded!"

# Enable vim-like pane navigation with hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Suitable replacement for last-window (moves to previously active window)
bind L last-window

# =====================================================================
# DESIGN TWEAKS
# =====================================================================

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

